name: email-triage-env
description: Environment for simulating email triage decisions using reward-based evaluation
version: 1.0

entry_point: environment:EmailEnv

observation_space:
  type: object
  properties:
    emails:
      type: list
      description: List of email objects with sender, subject, and type

action_space:
  type: object
  properties:
    email_id:
      type: integer
    action_type:
      type: string
      enum: [delete, reply, archive]

reward:
  type: float
  range: [0.0, 1.0]
  description: Reward based on correctness of action

tasks:
  - name: easy
    difficulty: easy
    description: Handle 3 emails correctly

  - name: medium
    difficulty: medium
    description: Handle 5 emails with fewer mistakes

  - name: hard
    difficulty: hard
    description: Handle 10 emails with strict evaluation

api:
  reset: true
  step: true
  state: true